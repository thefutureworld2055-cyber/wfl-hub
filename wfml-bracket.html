<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WFML — Playoff Bracket</title>
  <link rel="stylesheet" href="style.css">
  <style>
    iframe{
      width: 100%;
      height: 550px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0b1220;
    }
    @media (max-width: 900px){
      iframe{ height: 650px; }
    }
  </style>
</head>

<body>
  <div id="nav-placeholder"></div>
  <script src="nav.js"></script>

  <main class="wrap">
    <div class="card">
      <h2>WFML Playoff Bracket</h2>
      <p class="muted">Follow the WFML postseason live. Updated as results come in.</p>

      <div class="embed-wrap" style="margin-top:12px;">
        <iframe
          src="https://brackethq.com/b/8qm8c/embed/?name=1&stand=1"
          title="WFML Playoff Bracket"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        ></iframe>
      </div>
    </div>
  </main>
</body>
</html>
